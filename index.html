<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donor Intelligence Tool — IIMB</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 2rem;
    }

    .header-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 6px;
    }

    .header-title {
      font-size: 24px;
      font-weight: 600;
      color: #111;
      margin-bottom: 4px;
    }

    .header-sub {
      font-size: 13px;
      color: #666;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e8e6e0;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input[type="text"] {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 13px;
      color: #111;
      background: #fafaf8;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: #999;
      background: #fff;
    }

    .btn-primary {
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-full {
      width: 100%;
      padding: 11px;
      font-size: 14px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #888;
      margin-bottom: 8px;
    }

    .episodes-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ep-card {
      background: #fafaf8;
      border: 1px solid #e8e6e0;
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.15s, background 0.15s;
    }

    .ep-card:hover { border-color: #bbb; background: #fff; }
    .ep-card.selected { border: 1.5px solid #111; background: #fff; }

    .ep-title { font-size: 14px; font-weight: 500; color: #111; margin-bottom: 2px; }
    .ep-meta { font-size: 12px; color: #777; }

    .badge-new {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      background: #e8f0fe;
      color: #1a56db;
      font-weight: 500;
      white-space: nowrap;
    }

    .divider {
      border: none;
      border-top: 1px solid #e8e6e0;
      margin: 1rem 0;
    }

    .manual-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    /* Brief */
    .brief-card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e8e6e0;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .brief-header {
      padding: 16px 20px;
      border-bottom: 1px solid #e8e6e0;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #e8f0fe;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      color: #1a56db;
      flex-shrink: 0;
    }

    .brief-name { font-size: 16px; font-weight: 600; color: #111; margin-bottom: 2px; }
    .brief-role { font-size: 13px; color: #666; }

    .capacity-badge {
      margin-left: auto;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 6px;
    }

    .capacity-HIGH { background: #dcfce7; color: #166534; }
    .capacity-MEDIUM { background: #fef9c3; color: #854d0e; }
    .capacity-LOW { background: #fee2e2; color: #991b1b; }

    .brief-section {
      padding: 14px 20px;
      border-bottom: 1px solid #e8e6e0;
    }

    .brief-section:last-child { border-bottom: none; }

    .brief-text {
      font-size: 13px;
      color: #333;
      line-height: 1.65;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .tag {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .linkedin-link {
      font-size: 13px;
      color: #1a56db;
      text-decoration: none;
      word-break: break-all;
    }

    .linkedin-link:hover { text-decoration: underline; }

    .message-box {
      position: relative;
    }

    .copy-btn {
      position: absolute;
      top: 0;
      right: 0;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      background: #f5f4f0;
      color: #555;
      border: 1px solid #ddd;
      cursor: pointer;
    }

    .copy-btn:hover { background: #eee; }

    .message-text {
      font-size: 13px;
      color: #333;
      line-height: 1.7;
      white-space: pre-wrap;
      padding-right: 60px;
    }

    /* States */
    .loading {
      text-align: center;
      padding: 2.5rem;
      color: #888;
      font-size: 13px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #ddd;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #fff5f5;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #991b1b;
    }

    .api-key-notice {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      color: #92400e;
      margin-bottom: 1rem;
      line-height: 1.6;
    }

    .api-key-notice strong { font-weight: 600; }

    .api-key-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <p class="header-eyebrow">IIM Bangalore Development Foundation</p>
      <h1 class="header-title">Donor intelligence</h1>
      <p class="header-sub">Giving Pi · Catalyzing Change podcast → full donor brief + outreach message</p>
    </div>

    <!-- API Key -->
    <div class="api-key-notice" id="api-key-notice">
      <strong>One-time setup:</strong> This tool uses the Anthropic API. Enter your API key below — it stays in your browser only and is never stored anywhere.
      <div class="api-key-row">
        <input type="text" id="api-key-input" placeholder="sk-ant-..." style="flex:1; font-size:12px;" />
        <button class="btn-primary" onclick="saveKey()">Save key</button>
      </div>
    </div>

    <!-- Fetch episodes -->
    <div class="card">
      <p class="section-label">Podcast source</p>
      <div class="input-row">
        <input type="text" id="di-url" value="https://givingpi.org/catalyzing-change-podcast" />
        <button class="btn-primary" id="di-fetch-btn" onclick="fetchEpisodes()">Fetch episodes</button>
      </div>
    </div>

    <!-- Episodes -->
    <div id="di-episodes-area"></div>

    <!-- Brief output -->
    <div id="di-brief-area"></div>

  </div>

  <script>
    let episodes = [];
    let selectedIdx = null;
    let apiKey = localStorage.getItem('anthropic_api_key') || '';

    if (apiKey) {
      document.getElementById('api-key-notice').style.display = 'none';
    }

    function saveKey() {
      const val = document.getElementById('api-key-input').value.trim();
      if (!val.startsWith('sk-ant-')) { alert('That doesn\'t look like a valid Anthropic API key.'); return; }
      apiKey = val;
      localStorage.setItem('anthropic_api_key', val);
      document.getElementById('api-key-notice').style.display = 'none';
    }

    function initials(name) {
      return (name || 'G').split(' ').filter(Boolean).slice(0, 2).map(w => w[0].toUpperCase()).join('');
    }

    async function callClaude(systemPrompt, userMessage) {
      if (!apiKey) { alert('Please enter your Anthropic API key first.'); return null; }
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          system: systemPrompt,
          messages: [{ role: 'user', content: userMessage }]
        })
      });
      return await res.json();
    }

    function parseJSON(text) {
      const clean = text.replace(/```json|```/g, '').trim();
      const start = clean.indexOf('[') !== -1 && (clean.indexOf('{') === -1 || clean.indexOf('[') < clean.indexOf('{'))
        ? clean.indexOf('[') : clean.indexOf('{');
      const end = clean.indexOf('[') !== -1 && (clean.indexOf('{') === -1 || clean.indexOf('[') < clean.indexOf('{'))
        ? clean.lastIndexOf(']') : clean.lastIndexOf('}');
      return JSON.parse(clean.slice(start, end + 1));
    }

    async function fetchEpisodes() {
      const btn = document.getElementById('di-fetch-btn');
      const area = document.getElementById('di-episodes-area');
      btn.disabled = true;
      btn.textContent = 'Fetching…';
      area.innerHTML = `<div class="loading"><div class="spinner"></div>Scanning podcast page…</div>`;
      document.getElementById('di-brief-area').innerHTML = '';
      selectedIdx = null;

      try {
        const data = await callClaude(
          'You are a research assistant. Use web search to find the latest 4–5 episodes of the Giving Pi "Catalyzing Change" podcast. Return ONLY a JSON array with no markdown or backticks. Each object: { title, guest_name, guest_org, guest_role, episode_date, episode_url }. If a field is unknown use "".',
          'Fetch latest episodes from: https://givingpi.org/catalyzing-change-podcast'
        );
        if (!data) { area.innerHTML = manualInputHTML(); return; }
        const textBlock = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
        episodes = parseJSON(textBlock);
        renderEpisodes();
      } catch (e) {
        area.innerHTML = `<div class="error-box">Could not fetch episodes automatically. Use manual entry below.</div>` + manualInputHTML();
      }
      btn.disabled = false;
      btn.textContent = 'Fetch episodes';
    }

    function manualInputHTML() {
      return `<div class="card" style="margin-top:1rem;">
        <p class="section-label">Enter guest name manually</p>
        <div class="manual-row">
          <input type="text" id="di-manual-guest" placeholder="e.g. Rohini Nilekani" />
          <button class="btn-primary" onclick="generateBriefManual()">Generate brief</button>
        </div>
      </div>`;
    }

    function renderEpisodes() {
      const area = document.getElementById('di-episodes-area');
      if (!episodes || !episodes.length) {
        area.innerHTML = `<div class="error-box">No episodes found.</div>` + manualInputHTML();
        return;
      }

      let html = `<div class="card"><p class="section-label">Latest episodes</p><div class="episodes-list">`;
      episodes.forEach((ep, i) => {
        html += `<div class="ep-card" id="ep-${i}" onclick="selectEp(${i})">
          <div>
            <p class="ep-title">${ep.guest_name || ep.title || 'Episode ' + (i + 1)}</p>
            <p class="ep-meta">${[ep.guest_org, ep.guest_role, ep.episode_date].filter(Boolean).join(' · ')}</p>
          </div>
          ${i === 0 ? '<span class="badge-new">Latest</span>' : ''}
        </div>`;
      });
      html += `</div></div>`;
      html += `<div class="card"><button class="btn-primary btn-full" id="di-gen-btn" onclick="generateBrief()" disabled>Select an episode above</button></div>`;
      html += manualInputHTML();
      area.innerHTML = html;
    }

    function selectEp(i) {
      if (selectedIdx !== null) {
        const prev = document.getElementById('ep-' + selectedIdx);
        if (prev) prev.classList.remove('selected');
      }
      selectedIdx = i;
      const card = document.getElementById('ep-' + i);
      if (card) card.classList.add('selected');
      const btn = document.getElementById('di-gen-btn');
      if (btn) {
        btn.disabled = false;
        btn.textContent = `Generate brief for ${episodes[i].guest_name || 'this guest'} →`;
      }
      document.getElementById('di-brief-area').innerHTML = '';
    }

    async function generateBrief() {
      if (selectedIdx === null) return;
      const ep = episodes[selectedIdx];
      await runBriefGeneration(ep.guest_name, ep.guest_org, ep.guest_role);
    }

    async function generateBriefManual() {
      const name = (document.getElementById('di-manual-guest') || {}).value?.trim();
      if (!name) return;
      await runBriefGeneration(name, '', '');
    }

    async function runBriefGeneration(guestName, guestOrg, guestRole) {
      const briefArea = document.getElementById('di-brief-area');
      briefArea.innerHTML = `<div class="loading"><div class="spinner"></div>Researching ${guestName}…</div>`;
      briefArea.scrollIntoView({ behavior: 'smooth', block: 'start' });

      const prompt = `You are a donor intelligence analyst for IIM Bangalore (IIMB). Research the following person and produce a structured donor brief.

Guest: ${guestName}
Organisation: ${guestOrg || 'unknown'}
Role: ${guestRole || 'unknown'}

Use web search to find:
1. Who they are (2–3 sentences: background, current role, what they're known for)
2. Giving capacity: any public philanthropy, CSR mandate, family office, foundation, or wealth indicators. Rate as HIGH / MEDIUM / LOW with a one-line rationale.
3. IIMB alignment: which IIMB initiatives align with their interests — endowment, scholarships, research chairs, campus infrastructure, NSRCEL. Give 2–3 specific points.
4. LinkedIn profile URL (confirmed or best guess)
5. A personalised LinkedIn outreach message from Nathan Narde, Associate at IIM Bangalore Development Foundation. Under 150 words. Reference their Giving Pi podcast appearance. Mention a specific IIMB initiative relevant to their work. End with a soft ask for a 20-minute call. Warm, peer-to-peer tone, not salesy.

Return ONLY a JSON object, no markdown, no backticks:
{
  "name": "",
  "role": "",
  "org": "",
  "bio": "",
  "giving_capacity": "HIGH|MEDIUM|LOW",
  "giving_rationale": "",
  "alignment": ["point1", "point2", "point3"],
  "linkedin_url": "",
  "outreach_message": ""
}`;

      try {
        const data = await callClaude(
          'You are a donor intelligence analyst. Return only valid JSON with no markdown or backticks.',
          prompt
        );
        if (!data) { briefArea.innerHTML = `<div class="error-box">API key missing or invalid.</div>`; return; }
        const textBlock = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
        const brief = parseJSON(textBlock);
        renderBrief(brief);
      } catch (e) {
        briefArea.innerHTML = `<div class="error-box">Could not generate brief. Please try again.</div>`;
      }
    }

    function renderBrief(b) {
      const cap = b.giving_capacity || 'MEDIUM';
      const alignTags = (b.alignment || []).map(a => `<span class="tag">${a}</span>`).join('');
      const linkedinDisplay = b.linkedin_url && b.linkedin_url.startsWith('http')
        ? `<a class="linkedin-link" href="${b.linkedin_url}" target="_blank">${b.linkedin_url}</a>`
        : `<span style="font-size:13px;color:#888;">Search LinkedIn for <strong>${b.name}</strong></span>`;

      document.getElementById('di-brief-area').innerHTML = `
        <div class="brief-card">
          <div class="brief-header">
            <div class="avatar">${initials(b.name)}</div>
            <div>
              <p class="brief-name">${b.name}</p>
              <p class="brief-role">${[b.role, b.org].filter(Boolean).join(' · ')}</p>
            </div>
            <span class="capacity-badge capacity-${cap}">${cap} capacity</span>
          </div>
          <div class="brief-section">
            <p class="section-label">Profile</p>
            <p class="brief-text">${b.bio}</p>
          </div>
          <div class="brief-section">
            <p class="section-label">Giving signal</p>
            <p class="brief-text">${b.giving_rationale}</p>
          </div>
          <div class="brief-section">
            <p class="section-label">IIMB alignment</p>
            <div class="tags">${alignTags}</div>
          </div>
          <div class="brief-section">
            <p class="section-label">LinkedIn</p>
            ${linkedinDisplay}
          </div>
          <div class="brief-section">
            <p class="section-label">Outreach message</p>
            <div class="message-box">
              <button class="copy-btn" onclick="copyMsg()">Copy</button>
              <p class="message-text" id="di-msg-text">${b.outreach_message}</p>
            </div>
          </div>
        </div>`;
    }

    function copyMsg() {
      const txt = document.getElementById('di-msg-text');
      if (!txt) return;
      navigator.clipboard.writeText(txt.textContent).then(() => {
        const btn = document.querySelector('.copy-btn');
        if (btn) { btn.textContent = 'Copied!'; setTimeout(() => { btn.textContent = 'Copy'; }, 2000); }
      });
    }
  </script>
</body>
</html>
