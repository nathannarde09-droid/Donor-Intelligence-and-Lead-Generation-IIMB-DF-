<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donor Intelligence</title>
<style>
body { font-family: Arial; background:#f5f4f0; padding:40px;}
.container { max-width:700px; margin:auto;}
.card { background:#fff; padding:20px; border-radius:10px; margin-bottom:15px;}
button { background:#111; color:#fff; padding:10px 16px; border:none; border-radius:6px; cursor:pointer;}
input { width:100%; padding:10px; margin-bottom:10px;}
</style>
</head>

<body>
<div class="container">

<h2>Donor Intelligence</h2>

<div class="card">
<p>Enter guest name</p>
<input type="text" id="name" placeholder="e.g. Rohini Nilekani">
<button onclick="generate()">Generate brief</button>
</div>

<div id="output"></div>

</div>

<script>
function generate() {
  const name = document.getElementById("name").value;

  if (!name) return;

  const html = `
  <div class="card">
    <h3>${name}</h3>
    <p><strong>Estimated Capacity:</strong> ₹50L+/year</p>
    <p><strong>Signal:</strong> GivingPi member / ecosystem participant</p>
    <p><strong>IIMB Alignment:</strong> Scholarships, research, entrepreneurship (NSRCEL)</p>
    <p><strong>LinkedIn:</strong> Search "${name} LinkedIn"</p>
    <hr>
    <p><strong>Outreach Message:</strong></p>
    <p>
    Hi ${name}, I came across your work via GivingPi and was particularly interested in your contributions to the ecosystem.
    At IIM Bangalore Development Foundation, we’re building long-term initiatives across research and entrepreneurship.
    Would love to connect for a quick 20-min conversation to explore alignment.
    </p>
  </div>
  `;

  document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
